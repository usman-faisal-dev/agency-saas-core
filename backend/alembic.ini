# Alembic configuration file.
# The script_location below points to the migrations directory inside the app package.

[alembic]
script_location = app/db/alembic
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .

# DATABASE_URL is read from env in env.py — do NOT hardcode here.
# sqlalchemy.url is intentionally left blank.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
