name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agency_saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONPATH: .
      DATABASE_URL: postgresql://test:test@localhost:5432/agency_saas_test
      REDIS_URL: redis://localhost:6379
      CLERK_SECRET_KEY: sk_test_placeholder
      CLERK_JWKS_URL: https://placeholder.clerk.accounts.dev/.well-known/jwks.json
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXQ=' }}
      R2_ACCOUNT_ID: test_account_id
      R2_ACCESS_KEY_ID: test_access_key
      R2_SECRET_ACCESS_KEY: test_secret_key
      R2_PUBLIC_URL: https://cdn.example.com
      CORS_ORIGINS: '["http://localhost:3000"]'
      ENVIRONMENT: development

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run pytest
        run: pytest --tb=short -q
